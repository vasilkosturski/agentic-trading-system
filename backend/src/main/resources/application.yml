spring:
  application:
    name: agentic-trading-system
  
  profiles:
    active: postgresql  # Default to PostgreSQL

server:
  port: 8080

logging:
  level:
    com.trading: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

# OpenAI Configuration
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4
  max-tokens: 2000

# Market Data Configuration
market:
  alpha-vantage:
    api-key: ${ALPHA_VANTAGE_API_KEY:demo}
  polygon:
    api-key: ${POLYGON_API_KEY:}
    base-url: ${POLYGON_BASE_URL:https://api.polygon.io}
    enabled: true
    free-tier: true
  cache:
    ttl-minutes: 60

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://agentic-trading.vkontech.com}

# Trading Configuration
trading:
  initial-balance: 10000.0
  spread: 0.002 # 0.2% spread for buy/sell
  market-hours:
    start: "09:30"
    end: "16:00"
    timezone: "America/New_York"

# Push Notifications
notifications:
    enabled: false

# Agents API Configuration
agents:
  api:
    url: ${AGENTS_API_URL:http://agents-service:8000}