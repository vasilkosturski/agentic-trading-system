spring:
  application:
    name: agentic-trading-system

  profiles:
    active: postgresql  # Default to PostgreSQL

  # Enable Virtual Threads (Java 21 Project Loom)
  # Provides async performance with synchronous code simplicity
  threads:
    virtual:
      enabled: true

server:
  port: 8080
  error:
    include-message: always  # Required for Spring Boot 2.3+ to include error messages in responses

spring.mvc:
  problemdetails:
    enabled: true  # Enable RFC 7807 ProblemDetail support

logging:
  level:
    com.trading: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

# OpenAI Configuration
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4
  max-tokens: 2000

# Market Data Configuration (single provider: Finnhub)
market:
  finnhub:
    api-key: ${FINNHUB_API_KEY:}
    base-url: ${FINNHUB_BASE_URL:https://finnhub.io/api/v1}
  cache:
    ttl-minutes: 60

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://agentic-trading.vkontech.com}

# Trading Configuration
trading:
  initial-balance: 10000.0
  spread: 0.002 # 0.2% spread for buy/sell
  market-hours:
    start: "09:30"
    end: "16:00"
    timezone: "America/New_York"
  public:
    display-delay-days: 7 # Delay for public API responses (legal protection)
  # Per-agent profiles bound to AgentProperties. Keys are lowercase agent names;
  # lookup at runtime is case-insensitive (callers may pass "Warren" or "warren").
  agents:
    profiles:
      warren:
        initial-capital: 100000
        style: "Value Investor"
      george:
        initial-capital: 100000
        style: "Contrarian Macro"
      ray:
        initial-capital: 100000
        style: "Risk Parity"
      cathie:
        initial-capital: 100000
        style: "Growth Innovation"

# Push Notifications
notifications:
    enabled: false

# Spring Boot Actuator exposure & security.
# `endpoints.web.exposure.include` limits which endpoints are reachable at all
# (defense in depth #1 — non-listed endpoints return 404 regardless of auth).
# `endpoint.health.show-details: when-authorized` shows component-level health
# only to authenticated principals; anonymous callers see {"status":"UP"} alone.
# The /actuator/** admin gate in SecurityConfig is defense in depth #2.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Agents API Configuration
agents:
  api:
    url: ${AGENTS_API_URL:http://agents-service:8000}
    connect-timeout: 30000  # 30 seconds
    read-timeout: 60000     # 60 seconds

# JWT Configuration (for admin authentication)
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}  # 1 hour default

# Security cluster configuration (bound to SecurityProperties).
# Consolidates CORS, public matchers, JWT, and admin account settings.
#
# `security.jwt.secret` and `security.admin.password` have no YAML default — they
# must be provided via JWT_SECRET / ADMIN_PASSWORD environment variables. Missing
# values cause context-load failure via @NotBlank on SecurityProperties.
# (See backend/src/test/resources/application.yml for the test-only overrides.)
security:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://agentic-trading.vkontech.com}
  public-matchers:
    - /api/auth/**
    - /actuator/health
    - /actuator/info
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:3600000}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD}