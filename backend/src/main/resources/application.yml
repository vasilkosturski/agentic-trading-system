spring:
  application:
    name: agentic-trading-system
  
  profiles:
    active: postgresql  # Default to PostgreSQL

server:
  port: 8080

logging:
  level:
    com.trading: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

# OpenAI Configuration
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4
  max-tokens: 2000

# Market Data Configuration
market:
  alpha-vantage:
    api-key: ${ALPHA_VANTAGE_API_KEY:demo}
  polygon:
    api-key: ${POLYGON_API_KEY:}
    enabled: true
    free-tier: true
  cache:
    ttl-minutes: 60
  fallback-to-mock: true

# Trading Configuration
trading:
  initial-balance: 10000.0
  spread: 0.002 # 0.2% spread for buy/sell
  market-hours:
    start: "09:30"
    end: "16:00"
    timezone: "America/New_York"

# Push Notifications
notifications:
  pushover:
    user: ${PUSHOVER_USER:}
    token: ${PUSHOVER_TOKEN:}
    enabled: false