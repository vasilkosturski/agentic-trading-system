spring:
  application:
    name: agentic-trading-system

  profiles:
    active: postgresql  # Default to PostgreSQL

  # Enable Virtual Threads (Java 21 Project Loom)
  # Provides async performance with synchronous code simplicity
  threads:
    virtual:
      enabled: true

server:
  port: 8080
  error:
    include-message: always  # Required for Spring Boot 2.3+ to include error messages in responses

spring.mvc:
  problemdetails:
    enabled: true  # Enable RFC 7807 ProblemDetail support

logging:
  level:
    com.trading: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

# OpenAI Configuration
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4
  max-tokens: 2000

# Market Data Configuration (single provider: Finnhub)
market:
  finnhub:
    api-key: ${FINNHUB_API_KEY:}
    base-url: ${FINNHUB_BASE_URL:https://finnhub.io/api/v1}
  cache:
    ttl-minutes: 60

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://agentic-trading.vkontech.com}

# Trading Configuration
trading:
  initial-balance: 10000.0
  spread: 0.002 # 0.2% spread for buy/sell
  market-hours:
    start: "09:30"
    end: "16:00"
    timezone: "America/New_York"

# Push Notifications
notifications:
    enabled: false

# Agents API Configuration
agents:
  api:
    url: ${AGENTS_API_URL:http://agents-service:8000}
    connect-timeout: 30000  # 30 seconds
    read-timeout: 60000     # 60 seconds