# Full-Stack Agentic Trading System — Local Development Stack
#
# Usage: copy .env.example to .env, fill in your API keys, then run:
#   docker compose up --build
#
# Services:
#   postgres        — PostgreSQL 15 (schemas auto-created by Spring Boot JPA)
#   backend-service — Java 21 Spring Boot backend on http://localhost:8080
#   agents          — Python OpenAI Agents SDK + bundled Brave Search / Fetch MCP servers
#   frontend        — React + Vite, served via nginx on http://localhost:5173

services:
  # PostgreSQL — holds the agents/trading/analytics schemas (JPA auto-DDL on first backend boot).
  postgres:
    image: postgres:15-alpine
    container_name: agentic-trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentic_trading
      POSTGRES_USER: ${POSTGRES_USER:-trading_user}
      # Required at startup — copy .env.example to .env and set POSTGRES_PASSWORD before `docker compose up`.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required, set it in .env (see .env.example)}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trading-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading_user} -d agentic_trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot backend. Service name `backend-service` matches the K3s Service name so
  # frontend/nginx.conf's static `proxy_pass http://backend-service:8080/api/` works
  # unchanged across compose and K3s.
  backend-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentic-trading-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agentic_trading
      DB_USERNAME: ${POSTGRES_USER:-trading_user}
      # Required at startup — must match POSTGRES_PASSWORD above.
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required, set it in .env (see .env.example)}
      # Optional: real-time market data. Without it, certain endpoints fall back to cached / mock data.
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      # Login auth. JWT_SECRET / ADMIN_PASSWORD are required at startup so the stack never boots with a guessable default.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (HS256 needs >=32 chars), set it in .env (see .env.example)}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required, set it in .env (see .env.example)}
    ports:
      - "8080:8080"
    networks:
      - trading-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python agents container. The Brave Search and Fetch MCP servers run as stdio
  # subprocesses inside this container — the Dockerfile installs them globally
  # (`@modelcontextprotocol/server-brave-search` via npm, `mcp-server-fetch` via pip).
  # No separate MCP services needed.
  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: agentic-trading-agents
    restart: unless-stopped
    environment:
      # Required for the agents to do anything useful — see .env.example for where to get keys.
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required, set it in .env (see .env.example)}
      BRAVE_API_KEY: ${BRAVE_API_KEY:?BRAVE_API_KEY is required, set it in .env (see .env.example)}
      BACKEND_URL: "http://backend-service:8080"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-trading_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required, set it in .env (see .env.example)}@postgres:5432/agentic_trading"
      # JWT login against the backend. Must match ADMIN_USERNAME / ADMIN_PASSWORD above —
      # without these the agents pod boots but fails authentication on every cycle.
      BACKEND_ADMIN_USERNAME: ${BACKEND_ADMIN_USERNAME:-${ADMIN_USERNAME:-admin}}
      BACKEND_ADMIN_PASSWORD: ${BACKEND_ADMIN_PASSWORD:?BACKEND_ADMIN_PASSWORD is required and must match ADMIN_PASSWORD, set it in .env (see .env.example)}
      ENVIRONMENT: "development"
      LOG_LEVEL: "DEBUG"
      CONTINUOUS_MODE: "true"
      # Run a cycle every N minutes. 480 = 8h is a quiet default; lower it for active testing.
      RUN_EVERY_N_MINUTES: ${RUN_EVERY_N_MINUTES:-480}
      RUN_EVEN_WHEN_MARKET_IS_CLOSED: "true"
    volumes:
      # Mount agents source so contributors can edit Python files and restart the container
      # to pick up changes without a rebuild.
      - ./agents:/app
      # Persist agent memory + logs across container restarts.
      - agent_memory:/app/memory
      - agent_logs:/app/logs
    networks:
      trading-network:
        # Backend's `agents.api.url` defaults to `http://agents-service:8000`; this alias
        # makes that work without overriding the env var.
        aliases:
          - agents-service
    depends_on:
      backend-service:
        condition: service_healthy
    ports:
      - "8000:8000"  # API server (used by the backend to trigger manual cycles)
    command: python trading_system.py

  # React frontend. The Dockerfile runs `npm run build` and serves the bundled
  # output via nginx, which also proxies `/api/` to backend-service:8080.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentic-trading-frontend
    restart: unless-stopped
    ports:
      # nginx listens on container port 80; map to host 5173 to keep the dev URL stable.
      - "5173:80"
    networks:
      - trading-network
    depends_on:
      backend-service:
        condition: service_healthy


volumes:
  postgres_data:
    driver: local
  agent_memory:
    driver: local
  agent_logs:
    driver: local

networks:
  trading-network:
    driver: bridge
