# Full Stack Agentic Trading System - All Services in Docker
# Usage: docker-compose up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: agentic-trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentic_trading
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trading-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d agentic_trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentic-trading-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agentic_trading
      DB_USERNAME: trading_user
      DB_PASSWORD: trading_password
      # Market data API keys
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      # Auth — JwtTokenProvider rejects empty/missing JWT_SECRET so .env must reach the JVM
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    ports:
      - "8080:8080"
    networks:
      - trading-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python Agents (includes MCP servers)
  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: agentic-trading-agents
    restart: unless-stopped
    environment:
      # Match K3s environment variables exactly
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      BACKEND_URL: "http://backend:8080"
      DATABASE_URL: "postgresql://trading_user:trading_password@postgres:5432/agentic_trading"
      ENVIRONMENT: "development"
      LOG_LEVEL: "DEBUG"
      CONTINUOUS_MODE: "true"
      RUN_EVERY_N_MINUTES: "480"
      RUN_EVEN_WHEN_MARKET_IS_CLOSED: "true"
    volumes:
      # Mount source code for development
      - ./agents:/app
      # Persistent storage for agent memory/databases
      - agent_memory:/app/memory
      - agent_logs:/app/logs
    networks:
      - trading-network
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8000:8000"  # API server for manual cycle triggers
    # Run the production autonomous trading system
    command: python trading_system.py

  # React Frontend (production nginx image — built from frontend/Dockerfile)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentic-trading-frontend
    restart: unless-stopped
    ports:
      # Container nginx listens on 80; map to host 5173 to keep the dev URL stable.
      - "5173:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - trading-network
    depends_on:
      backend:
        condition: service_healthy


volumes:
  postgres_data:
    driver: local
  agent_memory:
    driver: local
  agent_logs:
    driver: local

networks:
  trading-network:
    driver: bridge