# Full Stack Agentic Trading System - All Services in Docker
# Usage: docker-compose up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: agentic-trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentic_trading
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - trading-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d agentic_trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentic-trading-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agentic_trading
      DB_USERNAME: trading_user
      DB_PASSWORD: trading_password
    ports:
      - "8080:8080"
    networks:
      - trading-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python Agents (includes MCP servers)
  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: agentic-trading-agents
    restart: unless-stopped
    environment:
      # MCP servers will connect to backend via Docker networking
      JAVA_API_BASE_URL: http://backend:8080/api/accounts
      # Environment variables for external APIs (add your keys here)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      PUSHOVER_TOKEN: ${PUSHOVER_TOKEN:-}
      PUSHOVER_USER: ${PUSHOVER_USER:-}
    volumes:
      # Mount source code for development
      - ./agents:/app
      # Persistent storage for agent memory/databases
      - agent_memory:/app/memory
      - agent_logs:/app/logs
    networks:
      - trading-network
    depends_on:
      backend:
        condition: service_healthy
    # No ports exposed - agents are autonomous scripts

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentic-trading-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:5173"  # Fixed: Use correct Vite port
    volumes:
      # Mount source code for development hot-reload
      - ./frontend:/app
      - /app/node_modules
    networks:
      - trading-network
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  agent_memory:
    driver: local
  agent_logs:
    driver: local

networks:
  trading-network:
    driver: bridge