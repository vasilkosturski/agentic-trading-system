[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
# This project is a flat collection of scripts, not a distributable package.
# Disable automatic package discovery to avoid build errors.
packages = []

[project]
name = "agentic-trading-agents"
version = "0.1.0"
description = "AI trading agents for the Agentic Trading System"
requires-python = ">=3.11"
dependencies = [
    "openai-agents>=0.8.0",
    "openai>=2.17.0",
    "python-dotenv>=1.1.0",
    "pydantic>=2.12.0",
    "aiohttp>=3.12.0",
    "httpx>=0.28.0",
    "mcp>=1.26.0",
    "requests>=2.32.0",
    "flask>=3.1.0",
]

[project.optional-dependencies]
test = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-mock>=3.15.0",
    "pytest-docker>=3.1.0",
    "aioresponses>=0.7.8",
    "psycopg2-binary>=2.9.0",
    "mypy>=1.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "tests/e2e"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
    "e2e: marks tests as end-to-end (requires real integrations, deselect with '-m \"not e2e\"')",
    "slow: marks tests as slow (LLM calls)",
    "costly: marks tests as costly (real API calls with billing)",
]
