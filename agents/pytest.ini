[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    e2e: marks tests as end-to-end (requires real integrations, deselect with '-m "not e2e"')
    slow: marks tests as slow (LLM calls)
    costly: marks tests as costly (real API calls with billing)
