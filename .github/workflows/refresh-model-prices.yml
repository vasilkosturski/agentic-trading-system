name: Refresh model_prices.json

# Pulls the latest LiteLLM pricing JSON once a month and, if it differs from
# what's vendored in this repo, opens a PR. Pricing changes are never
# auto-merged — a human reviews the diff and merges.
#
# Manual ad-hoc run:
#   gh workflow run refresh-model-prices.yml
on:
  schedule:
    # 09:00 UTC on the 1st of each month.
    - cron: '0 9 1 * *'
  workflow_dispatch:

# peter-evans/create-pull-request needs both: contents to push the branch,
# pull-requests to open the PR.
permissions:
  contents: write
  pull-requests: write

# An ad-hoc dispatch should never race with the cron. Cancel any in-flight
# run when a new one starts.
concurrency:
  group: refresh-model-prices
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest LiteLLM pricing JSON
        run: |
          curl --fail -sL \
            https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json \
            -o agents/model_prices.json

      - name: Detect drift
        id: diff
        run: |
          if ! git diff --quiet agents/model_prices.json; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize added/removed OpenAI-family keys
        if: steps.diff.outputs.has_changes == 'true'
        id: summary
        run: |
          # Snapshot the previous (committed) pricing file for comparison.
          git show HEAD:agents/model_prices.json > /tmp/prev.json 2>/dev/null || echo '{}' > /tmp/prev.json
          jq -r 'keys[]' /tmp/prev.json | sort > /tmp/prev_keys.txt
          jq -r 'keys[]' agents/model_prices.json | sort > /tmp/new_keys.txt
          # Filter to OpenAI-family keys (gpt-* and openai/*) — the rest is signal noise.
          comm -23 /tmp/prev_keys.txt /tmp/new_keys.txt | grep -E '^(gpt-|openai/)' > /tmp/removed.txt || true
          comm -13 /tmp/prev_keys.txt /tmp/new_keys.txt | grep -E '^(gpt-|openai/)' > /tmp/added.txt || true

          {
            echo "summary<<EOF"
            if [ -s /tmp/added.txt ]; then
              echo "**Added OpenAI-family models:**"
              sed 's/^/- `/; s/$/`/' /tmp/added.txt
              echo
            fi
            if [ -s /tmp/removed.txt ]; then
              echo "**Removed OpenAI-family models:**"
              sed 's/^/- `/; s/$/`/' /tmp/removed.txt
              echo
            fi
            if [ ! -s /tmp/added.txt ] && [ ! -s /tmp/removed.txt ]; then
              echo "_No OpenAI-family models added or removed — likely only price/context-window changes. See the diff for details._"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/refresh-model-prices-${{ github.run_id }}
          delete-branch: true
          commit-message: 'chore: refresh model_prices.json from LiteLLM'
          title: 'chore: refresh model_prices.json from LiteLLM'
          body: |
            Automated monthly refresh of `agents/model_prices.json` from the
            upstream LiteLLM source:

            <https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json>

            ${{ steps.summary.outputs.summary }}

            ## Reviewer checklist

            - [ ] Skim the diff — anything unexpected?
            - [ ] For any flagship model whose `input_cost_per_token` or
              `output_cost_per_token` moved, sanity-check against
              <https://openai.com/api/pricing/>.
            - [ ] Merge.

            _Generated by `.github/workflows/refresh-model-prices.yml`._
          labels: |
            dependencies
            automated
