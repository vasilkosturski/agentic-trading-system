name: Frontend Lint

# Runs ESLint and the TypeScript compiler in --noEmit mode against the
# frontend/ React + Vite project on PRs touching frontend sources or this
# workflow. Catches lint regressions and type errors at PR-review time
# without waiting for the slower vitest suite.

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-lint.yml'

jobs:
  eslint:
    name: eslint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        # Pinned to the v4 setup-node action. Node 20 is the current
        # active LTS line; bump when the runtime moves to the next LTS.
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm run lint
        run: npm run lint

  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: tsc --noEmit
        # Standalone type-only pass; the project build runs `tsc -b && vite
        # build` for emit, but PR-time feedback only needs type checking.
        run: npx tsc --noEmit
