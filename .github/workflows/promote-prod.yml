name: Promote to production

# Phase 4: manual promotion of a staging-verified build to prod.
# Retags the exact :sha-<commit> images that ran on staging to :prod-<commit>
# (bit-identical — no rebuild) and rolls the production deployments.
#
# SHA resolution:
#   - Leave the input blank (default) → the workflow reads the image tag the
#     STAGING cluster is currently running and promotes exactly that commit.
#     This promotes what was actually validated on staging, not "latest commit
#     on main" (which may not have reached staging yet).
#   - Pass commit_sha explicitly → promote that commit (manual override).
#
# `environment: production` records every promotion under the production
# environment (deploy history / rollback trail). No required reviewer is
# configured, so it is one-click; add a reviewer in repo Settings →
# Environments → production to gate it behind an approval later.

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit to promote. Blank = auto-resolve to the commit currently deployed on staging."
        required: false

permissions:
  contents: read

jobs:
  promote:
    name: Promote to prod
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set up SSH to the cluster
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Resolve SHA to promote (from staging, or explicit override)
        id: sha
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          INPUT_SHA: ${{ github.event.inputs.commit_sha }}
        run: |
          SSH="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=20 root@$HOST"
          NS=agentic-trading-staging
          img_of() {
            $SSH "kubectl -n $NS get deployment $1 -o jsonpath='{.spec.template.spec.containers[0].image}'"
          }
          if [ -n "$INPUT_SHA" ]; then
            SHA="$INPUT_SHA"
            echo "Using explicit override SHA: $SHA"
          else
            echo "No SHA given — resolving the commit currently running on staging."
            IMG=$(img_of backend)
            echo "staging backend image: $IMG"
            case "$IMG" in
              *:sha-*) SHA="${IMG##*:sha-}" ;;
              *) echo "::error::staging backend image '$IMG' is not a :sha-<commit> tag; pass commit_sha explicitly."; exit 1 ;;
            esac
            # All three staging deployments must be on the same commit, else
            # staging is mid-deploy or inconsistent — refuse to promote a
            # partial state to production.
            for c in frontend agents; do
              OTHER=$(img_of "$c")
              case "$OTHER" in
                *:sha-$SHA) ;;
                *) echo "::error::staging $c is on '$OTHER', not sha-$SHA — staging is inconsistent; aborting."; exit 1 ;;
              esac
            done
            echo "All 3 staging deployments are on sha-$SHA"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Promoting sha-$SHA"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: vasilkosturski
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Retag staging images to :prod-<sha> (bit-identical, registry-side)
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          for c in backend frontend agents; do
            img=ghcr.io/vasilkosturski/agentic-trading-$c
            docker buildx imagetools create -t "$img:prod-$SHA" "$img:sha-$SHA"
          done

      - name: Deploy production
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          SSH="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=20 root@$HOST"
          for c in backend frontend agents; do
            echo "::group::deploy prod $c"
            $SSH "kubectl -n agentic-trading set image deployment/$c $c=ghcr.io/vasilkosturski/agentic-trading-$c:prod-$SHA"
            $SSH "kubectl -n agentic-trading rollout status deployment/$c --timeout=180s"
            echo "::endgroup::"
          done

      - name: Prod smoke (confirm it actually serves)
        run: |
          base=https://agentic-trading.vkontech.com
          curl -fsS --max-time 30 "$base/actuator/health" >/dev/null
          curl -fsS --max-time 30 "$base/api/agents"       >/dev/null
          echo "prod smoke OK — promoted sha-${{ steps.sha.outputs.sha }}"
