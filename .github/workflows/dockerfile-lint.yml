name: Dockerfile Lint

# Runs hadolint against every Dockerfile in the repo on PRs touching them.
# Catches unpinned base images, missing USER directives, apt-get without
# --no-install-recommends, and similar Dockerfile smells at PR-review time.

on:
  pull_request:
    branches: [main]
    paths:
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '.github/workflows/dockerfile-lint.yml'

jobs:
  hadolint:
    name: hadolint (all Dockerfiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hadolint on every Dockerfile
        # Pinned to the v3.1.0 action release. The action wraps the hadolint
        # binary, surfaces SARIF + GitHub-annotation output, and supports a
        # repo-level .hadolint.yaml for per-rule overrides if we add one later.
        uses: hadolint/hadolint-action@v3.1.0
        with:
          # Lint every Dockerfile + Dockerfile.* across the repo. The action
          # handles glob expansion server-side.
          recursive: true
          # Fail the job on errors and warnings; info-level findings remain
          # advisory so the job doesn't block on stylistic nits.
          failure-threshold: warning
          ignore: DL3008,DL3013,DL3018,DL3059
          # DL3008/DL3013/DL3018 are apt/npm/apk version-pinning rules and
          # DL3059 flags multiple consecutive RUN instructions. Silenced for
          # now so the gate can land without an upfront base-image and
          # package-pinning cleanup of every existing Dockerfile.
