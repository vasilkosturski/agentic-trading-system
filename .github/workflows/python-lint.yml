name: Python Lint

# Runs ruff (lint + format check) and mypy against the agents/ Python
# project on PRs touching Python sources or this workflow. Catches style
# drift, deprecated typing imports, undefined names, and type errors at
# PR-review time without waiting for the slower pytest suite.

on:
  pull_request:
    branches: [main]
    paths:
      - 'agents/**/*.py'
      - 'agents/pyproject.toml'
      - '.github/workflows/python-lint.yml'

jobs:
  ruff:
    name: ruff (check + format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        # Pinned to the v5 setup-python action. Reads requires-python from
        # the project's pyproject.toml (>=3.11) and installs a matching
        # interpreter on the runner.
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        # Pinned to a current minor; ruff bumps regularly so we re-pin on
        # the cadence we feel like reviewing CI churn.
        run: pip install 'ruff>=0.6.0'

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project + lint deps
        # mypy needs the project's own dependencies on the path to resolve
        # imports; install the package in editable mode plus the lint
        # extras (ruff + mypy) declared in pyproject.toml.
        run: |
          pip install -e .
          pip install -e '.[lint]'

      - name: mypy
        # Source roots match the local check; tests are excluded via the
        # tests.* override in pyproject.toml [tool.mypy].
        run: |
          mypy ai_agents api backend infra mcp_helpers models phases tools utils \
               agent_executor.py agent_registry.py config.py logging_config.py trading_system.py
