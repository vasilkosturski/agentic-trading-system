name: Agentic staging check

# Phase 3: headless Claude verifies the latest staging trading cycle, checks the
# live dashboard via Playwright, diffs against the previous committed report to
# detect drift, and emits a structured JSON verdict the pipeline gates on.
# Reports live in reports/ci-cycles/ (kept to the newest 30); screenshots are
# artifacts only. Prompt + content-safety rules: .github/agentic-staging-check.md
#
# Runs ONLY as a pre-promote gate (called by promote-prod.yml) or manually.
# No nightly schedule — that spent real API $ every night for a report nobody
# reads; this check earns its cost by gating an actual prod deploy. Per-push
# code coverage is handled deterministically by the Phase 2 e2e in main.yml.
#
# Required repo secrets: ANTHROPIC_API_KEY, HETZNER_SSH_KEY, HETZNER_HOST.

on:
  workflow_dispatch: {} # manual, on-demand
  workflow_call: {} # pre-promote gate (promote-prod.yml)

permissions:
  contents: write # commit the new report back to reports/ci-cycles/
  id-token: write # claude-code-action requests an OIDC token during setup

concurrency:
  group: agentic-staging-check
  cancel-in-progress: false

jobs:
  verify:
    name: Agentic staging verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH to the cluster (read-only DB access)
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          chmod +x .github/scripts/staging-psql.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Bump the vN suffix to force a refresh when the pinned MCP/browser changes.
          key: ${{ runner.os }}-playwright-v1

      - name: Install Playwright MCP + browser
        run: |
          npm install -g @playwright/mcp@latest
          # If the browser cache hit, skip the (large) chromium download and only
          # ensure the OS deps are present; otherwise do the full install.
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            npx --yes playwright install-deps chromium
          else
            npx --yes playwright install --with-deps chromium
          fi

      - name: Write Playwright MCP config
        run: |
          cat > /tmp/mcp-config.json <<'EOF'
          {"mcpServers":{"playwright":{"command":"npx","args":["-y","@playwright/mcp@latest","--headless","--isolated"]}}}
          EOF

      - name: Load prompt
        id: prompt
        run: |
          {
            echo 'text<<PROMPT_EOF'
            cat .github/agentic-staging-check.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run agentic staging verification
        id: verify
        # Fail soft: if the agent errors or exhausts its turns, the action exits
        # non-zero — but we still want the gate step below to run and interpret
        # the verdict file (turning an incomplete run into a graceful `error`
        # rather than a hard step failure that skips our logic).
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.prompt.outputs.text }}
          claude_args: >-
            --max-turns 80
            --model claude-sonnet-5
            --mcp-config /tmp/mcp-config.json
            --permission-mode bypassPermissions

      - name: Gate on the JSON verdict
        id: gate
        if: always()
        run: |
          # The agent writes its verdict to verdict.json at the repo root (prompt Step 5).
          VERDICT=""
          if [ -f verdict.json ]; then
            VERDICT=$(tr -d '\n' < verdict.json)
          fi
          echo "verdict: $VERDICT"
          {
            echo "verdict<<VEOF"
            echo "$VERDICT"
            echo "VEOF"
          } >> "$GITHUB_OUTPUT"
          STATUS=$(printf '%s' "$VERDICT" | sed -nE 's/.*"status"[[:space:]]*:[[:space:]]*"([a-z]+)".*/\1/p')
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Upload report + screenshots (artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-staging-report
          path: |
            reports/ci-cycles/*.md
            reports/ci-cycles/screenshots/**
          if-no-files-found: warn

      - name: Commit new report (prune to newest 30) — only on a real verdict
        if: steps.gate.outputs.status == 'pass' || steps.gate.outputs.status == 'fail'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd reports/ci-cycles
          # keep newest 30 markdown reports; drop older
          ls -1 *.md 2>/dev/null | sort | head -n -30 | xargs -r rm -f
          # screenshots are artifacts only — never commit them
          rm -rf screenshots
          cd -
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ci-cycles/*.md
          if git diff --cached --quiet; then
            echo "no report change to commit"
          else
            git commit -m "chore(ci): agentic staging cycle report [skip ci]"
            # Push over an explicitly-tokenized remote — the Claude action step
            # can leave the default credential helper unusable for a raw push.
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:${GITHUB_REF_NAME}
          fi

      - name: Enforce verdict
        # Pass the verdict via env (NOT ${{ }} interpolated into the script) — the
        # JSON contains quotes/brackets that break bash if pasted as code.
        env:
          STATUS: ${{ steps.gate.outputs.status }}
          VERDICT: ${{ steps.gate.outputs.verdict }}
        run: |
          case "$STATUS" in
            pass)  echo "✅ staging verified — no regressions"; exit 0 ;;
            fail)  echo "::error::Agentic staging check FAILED — real regression."; printf '%s\n' "$VERDICT"; exit 1 ;;
            error) echo "::error::Agentic check could not complete (infra/agent error) — re-run to retry."; printf '%s\n' "$VERDICT"; exit 1 ;;
            *)     echo "::error::No parseable verdict emitted by the agent"; exit 1 ;;
          esac
