name: Backend Lint

# Runs Spotless (palantir-java-format), Checkstyle, and the test suite
# against the backend/ Spring Boot project on PRs touching Java sources,
# the Gradle build, the Checkstyle config, or this workflow.

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**/*.java'
      - 'backend/build.gradle.kts'
      - 'backend/settings.gradle.kts'
      - 'backend/gradle/**'
      - 'backend/config/checkstyle/**'
      - '.github/workflows/backend-lint.yml'

jobs:
  spotless:
    name: spotlessCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        # Pinned to the v4 setup-java action with Temurin 21, matching the
        # sourceCompatibility declared in backend/build.gradle.kts.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: spotlessCheck
        run: ./gradlew --no-daemon spotlessCheck

  checkstyle:
    name: checkstyleMain + checkstyleTest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: checkstyle
        run: ./gradlew --no-daemon checkstyleMain checkstyleTest

  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: test
        # The suite includes Testcontainers-backed integration tests; the
        # ubuntu-latest runner ships Docker, which is what Testcontainers
        # needs to spin up the PostgreSQL container.
        run: ./gradlew --no-daemon test
