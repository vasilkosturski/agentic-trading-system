name: E2E (containerized)

# Phase 2: the full-cycle real-integration e2e test (agents/tests/e2e) against a
# containerized stack (postgres + a freshly-built backend) with REAL OpenAI +
# Brave + Finnhub calls (~17k tokens, ~7¢, ~3min per run). The trade executes
# against the ephemeral test backend only (no real brokerage).
#
# Runs three ways: (1) called by main.yml on every push as a gate before the
# staging deploy (workflow_call); (2) nightly (schedule); (3) on-demand
# (workflow_dispatch).
#
# Required repo secrets: OPENAI_API_KEY, BRAVE_API_KEY, FINNHUB_API_KEY, JWT_SECRET.

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC nightly
  workflow_dispatch: {}
  workflow_call: {} # invoked by promote-prod.yml before a prod promotion

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: Containerized e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image for the e2e stack
        # The e2e compose (docker-compose.e2e.yml) expects this exact local tag.
        run: docker build -t localhost/agentic-trading-backend:e2e -f backend/Dockerfile backend

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install agents package + MCP servers
        working-directory: agents
        run: |
          pip install -e ".[test]"
          pip install mcp-server-fetch==2025.4.7
          npm install -g @modelcontextprotocol/server-brave-search@0.6.2

      - name: Write .env for the e2e stack
        # conftest.py requires a repo-root .env; the backend compose service
        # reads it via env_file. DB_* come from the compose `environment:` block.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          # Ephemeral admin creds for the throwaway test backend, generated
          # fresh each run so no credential is committed to this (public) repo.
          # Both sides must use the same value: the backend creates its admin
          # user from ADMIN_USERNAME/ADMIN_PASSWORD, the agents log in with
          # BACKEND_ADMIN_USERNAME/BACKEND_ADMIN_PASSWORD (config.py). A mismatch
          # (e.g. the agents' empty-string default) makes login fail with HTTP 400.
          ADMIN_PW="$(openssl rand -hex 24)"
          # trading.public.display-delay-days defaults to 7: the public /api/runs
          # hides runs newer than that ("legal protection" delay). The e2e asserts
          # on the run it just created, so zero the delay for the test backend
          # (SPRING_APPLICATION_JSON overrides the property unambiguously).
          cat > .env <<EOF
          OPENAI_API_KEY=$OPENAI_API_KEY
          BRAVE_API_KEY=$BRAVE_API_KEY
          FINNHUB_API_KEY=$FINNHUB_API_KEY
          JWT_SECRET=$JWT_SECRET
          ADMIN_USERNAME=admin
          ADMIN_PASSWORD=$ADMIN_PW
          BACKEND_ADMIN_USERNAME=admin
          BACKEND_ADMIN_PASSWORD=$ADMIN_PW
          SPRING_APPLICATION_JSON={"trading":{"public":{"display-delay-days":0}}}
          EOF

      - name: Run e2e test
        working-directory: agents
        # Only the full-cycle test runs as the gate: it exercises the whole
        # chain (research -> decision -> execution -> trade), so it covers what
        # the per-agent e2e tests do individually, for the least API $. The
        # per-agent tests (test_decision_maker_e2e, test_market_analyst_e2e)
        # stay in the repo for local isolation debugging; the richer end-to-end
        # verification comes from the Phase 3 agentic staging report.
        env:
          E2E_COMPOSE_COMMAND: "docker compose"
          RUN_EVERY_N_MINUTES: "60"
          NO_UPDATE_NOTIFIER: "1" # keep npm's update notice off the MCP servers' stdout
        run: pytest tests/e2e/test_full_cycle_e2e.py -m e2e -v
