name: CI/CD — main

# Phase 1a: run unit tests on every push to main.
# Phase 1b (next) adds build+push images and deploy-to-staging jobs.

on:
  push:
    branches: [main]

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: gradle test
        run: ./gradlew test --no-daemon

  agents-test:
    name: Agents tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/pyproject.toml
      - name: install
        run: pip install -e ".[test]"
      - name: pytest (unit only)
        env:
          RUN_EVERY_N_MINUTES: "60"
        run: pytest --ignore=tests/e2e -m "not integration and not e2e" -q

  frontend-test:
    name: Frontend tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci
      - name: test
        run: npm run test -- --run
      - name: build
        run: npm run build
