name: CI/CD — main

# Phase 1b: on every push to main → run unit tests → build+push 3 images to GHCR
# (:sha-<commit> + :latest) → deploy staging by rolling each deployment to the new SHA.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: gradle test
        run: ./gradlew test --no-daemon

  agents-test:
    name: Agents tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/pyproject.toml
      - name: install
        run: pip install -e ".[test]"
      - name: pytest (unit only)
        env:
          RUN_EVERY_N_MINUTES: "60"
        run: pytest --ignore=tests/e2e -m "not integration and not e2e" -q

  frontend-test:
    name: Frontend tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci
      - name: test
        run: npm run test -- --run
      - name: build
        run: npm run build

  build-push:
    name: Build & push (${{ matrix.component }})
    needs: [backend-test, agents-test, frontend-test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: ./backend
            file: ./backend/Dockerfile
          - component: agents
            context: ./agents
            file: ./agents/Dockerfile
          - component: frontend
            context: ./frontend
            file: ./frontend/Dockerfile.production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: vasilkosturski
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/vasilkosturski/agentic-trading-${{ matrix.component }}:sha-${{ github.sha }}
            ghcr.io/vasilkosturski/agentic-trading-${{ matrix.component }}:latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  deploy-staging:
    name: Deploy to staging
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Roll staging deployments to this commit's images
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HOST: ${{ secrets.HETZNER_HOST }}
          SHA: ${{ github.sha }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          SSH="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=20 root@$HOST"
          for c in backend frontend agents; do
            echo "::group::deploy $c"
            $SSH "kubectl -n agentic-trading-staging set image deployment/$c $c=ghcr.io/vasilkosturski/agentic-trading-$c:sha-$SHA"
            $SSH "kubectl -n agentic-trading-staging rollout status deployment/$c --timeout=180s"
            echo "::endgroup::"
          done
