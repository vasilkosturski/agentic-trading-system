name: CI/CD — main

# Phase 1b: on every push to main → lint + unit-test each component → build+push
# 3 images to GHCR (:sha-<commit> + :latest) → deploy staging by rolling each
# deployment to the new SHA.
#
# Lint runs as a HARD GATE inside each component job (before its tests) plus a
# standalone Dockerfile-lint job — build-push depends on all four, so any lint
# failure blocks the build and the deploy. This pipeline is the single gate:
# every check (format, style, types, tests, Dockerfile lint) runs here on push
# to main, so a dirty commit can never reach staging or production.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: spotlessCheck
        run: ./gradlew --no-daemon spotlessCheck
      - name: checkstyle
        run: ./gradlew --no-daemon checkstyleMain checkstyleTest
      - name: test
        run: ./gradlew --no-daemon test

  agents:
    name: Agents lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/pyproject.toml
      - name: install
        run: pip install -e ".[test,lint]"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .
      - name: mypy
        run: |
          mypy ai_agents api backend infra mcp_helpers models phase_runner tools utils \
               agent_registry.py config.py logging_config.py trading_system.py
      - name: pytest (unit only)
        env:
          RUN_EVERY_N_MINUTES: "60"
        run: pytest --ignore=tests/e2e -m "not integration and not e2e" -q

  frontend:
    name: Frontend lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci
      - name: eslint
        run: npm run lint
      - name: tsc --noEmit
        run: npx tsc --noEmit
      - name: test
        run: npm run test -- --run
      - name: build
        run: npm run build

  dockerfile-lint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: hadolint (all Dockerfiles)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning
          # DL3008/DL3013/DL3018 are apt/npm/apk version-pinning rules and
          # DL3059 flags consecutive RUN instructions — silenced so the gate
          # lands without an upfront base-image and package-pinning cleanup.
          ignore: DL3008,DL3013,DL3018,DL3059

  build-push:
    name: Build & push (${{ matrix.component }})
    needs: [backend, agents, frontend, dockerfile-lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: ./backend
            file: ./backend/Dockerfile
          - component: agents
            context: ./agents
            file: ./agents/Dockerfile
          - component: frontend
            context: ./frontend
            file: ./frontend/Dockerfile.production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: vasilkosturski
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/vasilkosturski/agentic-trading-${{ matrix.component }}:sha-${{ github.sha }}
            ghcr.io/vasilkosturski/agentic-trading-${{ matrix.component }}:latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  e2e:
    name: E2E gate
    # Real-integration full-cycle test (agents/tests/e2e) against a containerized
    # stack (postgres + a freshly-built backend) with REAL OpenAI + Brave + Finnhub
    # calls (~17k tokens, ~7¢, ~3min). Runs on every push in parallel with
    # build-push; deploy-staging waits on it, so a red e2e blocks the staging
    # deploy. The trade executes against the ephemeral test backend only.
    # Requires repo secrets: OPENAI_API_KEY, BRAVE_API_KEY, FINNHUB_API_KEY, JWT_SECRET.
    needs: [backend, agents, frontend, dockerfile-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image for the e2e stack
        # docker-compose.e2e.yml expects this exact local tag.
        run: docker build -t localhost/agentic-trading-backend:e2e -f backend/Dockerfile backend
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install agents package + MCP servers
        working-directory: agents
        run: |
          pip install -e ".[test]"
          pip install mcp-server-fetch==2025.4.7
          npm install -g @modelcontextprotocol/server-brave-search@0.6.2
      - name: Write .env for the e2e stack
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          # Ephemeral admin creds for the throwaway test backend, generated fresh
          # each run so nothing is committed. Backend creates its admin from
          # ADMIN_USERNAME/ADMIN_PASSWORD; agents log in with BACKEND_ADMIN_* — both
          # must match or login fails HTTP 400. display-delay-days=0 so the e2e can
          # read back the run it just created (public API hides recent runs by default).
          ADMIN_PW="$(openssl rand -hex 24)"
          cat > .env <<EOF
          OPENAI_API_KEY=$OPENAI_API_KEY
          BRAVE_API_KEY=$BRAVE_API_KEY
          FINNHUB_API_KEY=$FINNHUB_API_KEY
          JWT_SECRET=$JWT_SECRET
          ADMIN_USERNAME=admin
          ADMIN_PASSWORD=$ADMIN_PW
          BACKEND_ADMIN_USERNAME=admin
          BACKEND_ADMIN_PASSWORD=$ADMIN_PW
          SPRING_APPLICATION_JSON={"trading":{"public":{"display-delay-days":0}}}
          EOF
      - name: Run e2e test
        working-directory: agents
        # Only the full-cycle test runs as the gate: it exercises the whole chain
        # (research -> decision -> execution -> trade). The per-agent e2e tests stay
        # in the repo for local isolation debugging.
        env:
          E2E_COMPOSE_COMMAND: "docker compose"
          RUN_EVERY_N_MINUTES: "60"
          NO_UPDATE_NOTIFIER: "1" # keep npm's update notice off the MCP servers' stdout
          OPENAI_AGENTS_DISABLE_TRACING: "1" # SDK trace exporter races pytest teardown
        run: pytest tests/e2e/test_full_cycle_e2e.py -m e2e -v

  deploy-staging:
    name: Deploy to staging
    needs: [build-push, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Roll staging deployments to this commit's images
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HOST: ${{ secrets.HETZNER_HOST }}
          SHA: ${{ github.sha }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          SSH="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=20 root@$HOST"
          for c in backend frontend agents; do
            echo "::group::deploy $c"
            $SSH "kubectl -n agentic-trading-staging set image deployment/$c $c=ghcr.io/vasilkosturski/agentic-trading-$c:sha-$SHA"
            $SSH "kubectl -n agentic-trading-staging rollout status deployment/$c --timeout=180s"
            echo "::endgroup::"
          done
      - name: Staging smoke (confirm it actually serves)
        run: |
          base=https://staging.agentic-trading.vkontech.com
          curl -fsS --max-time 30 "$base/actuator/health" >/dev/null
          curl -fsS --max-time 30 "$base/api/agents"       >/dev/null
          echo "staging smoke OK"
