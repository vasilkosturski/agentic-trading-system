server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Block security scanner bot requests (return 444 = close connection without response)
    # These patterns are probed by vulnerability scanners and generate 404 noise:
    # - /.env, /.env.local, /.env;.jpg (environment variable files)
    # - /ecosystem.config.js (PM2 configuration)
    # Returning 444 silently drops the connection without logging errors.
    location ~* "^/\.env" {
        return 444;
    }

    location = /ecosystem.config.js {
        return 444;
    }

    # Proxy API requests to backend (Docker Compose uses this; K8s ingress routes /api directly)
    # Static proxy_pass — nginx resolves "backend" once at startup using the runtime's DNS.
    # Previously used `resolver 127.0.0.11` (Docker's embedded DNS) + a variable target, but
    # that resolver address doesn't exist on Podman/rootless networks and broke every /api/*
    # with 502. Both Docker and Podman resolve container DNS names via the container's
    # /etc/resolv.conf without needing an explicit resolver directive.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Hashed build assets (Vite emits /assets/index-<hash>.js etc.) are safe to
    # cache forever — the filename changes on every build. `always` emits the
    # header on 404s too, so browsers requesting an old bundle hash after a
    # fresh deploy still see it.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # The HTML shell MUST revalidate on every load so browsers never pin a
    # stale index.html that references bundle hashes that no longer exist
    # on the server after a fresh deploy. `no-cache` (NOT `no-store`) lets
    # the browser cache the response but forces a conditional GET every time.
    # `always` is required so the header is also emitted on error responses
    # (without it, add_header only applies to 200/201/204/206/301/302/303/304/307/308).
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # SPA routing: all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Loose static assets from public/ (favicon, images, fonts not bundled by
    # Vite). Filenames are NOT content-hashed, so `immutable` would strand
    # clients on stale copies when we ship a new favicon. `must-revalidate`
    # with a 1-day TTL gives a conditional GET after a day — cheap 304 if
    # unchanged, immediate pickup when we redeploy.
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate" always;
    }
}
